name: iinteract
description: "iInteract: i Feel, i Speak - communication board app"
publish_to: 'none'
version: 2.2.0+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.1.0
  shared_preferences: ^2.5.3
  path_provider: ^2.1.4
  crypto: ^3.0.6
  image_picker: ^1.1.2
  record: ^5.2.0
  flutter_colorpicker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
